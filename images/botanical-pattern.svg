    <path d="M19,252 C25,232 30,226 30,226 C30,226 35,232 41,252" stroke-width="0.9"/>
    <line x1="30"  y1="226" x2="30"  y2="215" stroke-width="0.9"/>
    <line x1="22"  y1="231" x2="16"  y2="223" stroke-width="0.9"/>
    <line x1="38"  y1="231" x2="44"  y2="223" stroke-width="0.9"/>
