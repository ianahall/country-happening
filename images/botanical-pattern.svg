    <line x1="60" y1="600" x2="60" y2="398" stroke-width="1.1"/>
    <path d="M60,398 C48,378 44,358 46,338" stroke-width="0.9"/>
    <path d="M60,398 C60,373 60,348 60,323"  stroke-width="0.9"/>
    <path d="M60,398 C72,378 76,358 74,338"  stroke-width="0.9"/>
    <circle cx="46" cy="336" r="3" stroke-width="0.8"/>
    <circle cx="60" cy="321" r="3" stroke-width="0.8"/>
    <circle cx="74" cy="336" r="3" stroke-width="0.8"/>

    <!-- ── PLANT 7: Short daisy stem – mid-right ─── -->
    <line x1="118" y1="600" x2="118" y2="534" stroke-width="1"/>
    <circle cx="118" cy="526" r="8" stroke-width="0.9"/>
    <line x1="118" y1="518" x2="118" y2="511" stroke-width="0.7"/>
    <line x1="125" y1="520" x2="130" y2="514" stroke-width="0.7"/>
    <line x1="127" y1="527" x2="134" y2="527" stroke-width="0.7"/>
    <line x1="111" y1="520" x2="106" y2="514" stroke-width="0.7"/>
    <line x1="109" y1="527" x2="102" y2="527" stroke-width="0.7"/>

    <!-- ── Grass blades at base ─── -->
    <path d="M48,600  Q53,572 46,546"  stroke-width="0.9"/>
    <path d="M74,600  Q67,568 72,540"  stroke-width="0.9"/>
    <path d="M138,600 Q143,570 139,543" stroke-width="0.9"/>
    <path d="M155,600 Q162,566 158,538" stroke-width="0.9"/>
    <path d="M176,600 Q184,568 180,542" stroke-width="0.9"/>

    <!-- ── Low leaf cluster – center base ─── -->
    <path d="M90,580 C74,568 64,552 60,534"  stroke-width="0.9"/>
    <path d="M90,560 C106,548 116,532 120,514" stroke-width="0.9"/>

