    <line x1="162" y1="312" x2="132" y2="289" stroke-width="1"/>
    <line x1="162" y1="312" x2="147" y2="282" stroke-width="1"/>
    <line x1="162" y1="312" x2="162" y2="279" stroke-width="1"/>
    <line x1="162" y1="312" x2="177" y2="282" stroke-width="1"/>
    <line x1="162" y1="312" x2="192" y2="289" stroke-width="1"/>
    <!-- tiny cluster heads at tips -->
    <circle cx="132" cy="287" r="5"   stroke-width="0.9"/>
    <circle cx="147" cy="280" r="5.5" stroke-width="0.9"/>
    <circle cx="162" cy="277" r="7"   stroke-width="0.9"/>
    <circle cx="177" cy="280" r="5.5" stroke-width="0.9"/>
    <circle cx="192" cy="287" r="5"   stroke-width="0.9"/>
    <!-- leaves -->
    <path d="M162,492 C144,478 132,458 126,436" stroke-width="1.1"/>
    <path d="M162,422 C179,408 188,389 190,369" stroke-width="1.1"/>

