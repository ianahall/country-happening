<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="600" viewBox="0 0 200 600">
  <g fill="none" stroke="#DDB8A5" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── PLANT 1: Tall Allium (globe flower) ─── -->
    <line x1="90" y1="600" x2="90" y2="220" stroke-width="1.2"/>
    <circle cx="90" cy="200" r="22" stroke-width="1.2"/>
    <!-- radiating marks suggesting sphere -->
    <line x1="90" y1="178" x2="90" y2="168" stroke-width="0.8"/>
    <line x1="107" y1="183" x2="115" y2="174" stroke-width="0.8"/>
    <line x1="112" y1="200" x2="122" y2="200" stroke-width="0.8"/>
    <line x1="107" y1="217" x2="115" y2="226" stroke-width="0.8"/>
    <line x1="73"  y1="217" x2="65"  y2="226" stroke-width="0.8"/>
    <line x1="68"  y1="200" x2="58"  y2="200" stroke-width="0.8"/>
    <line x1="73"  y1="183" x2="65"  y2="174" stroke-width="0.8"/>
    <!-- leaves -->
    <path d="M90,440 C70,426 56,406 48,383" stroke-width="1.1"/>
    <path d="M90,375 C108,361 118,343 122,323" stroke-width="1.1"/>
    <path d="M90,315 C72,303 60,286 54,267" stroke-width="1.1"/>

