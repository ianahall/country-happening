    <line x1="8" y1="600" x2="8" y2="500" stroke-width="1"/>
    <circle cx="8" cy="492" r="9" stroke-width="0.9"/>
    <line x1="8"  y1="483" x2="8"  y2="476" stroke-width="0.7"/>
    <line x1="15" y1="485" x2="20" y2="479" stroke-width="0.7"/>
    <line x1="17" y1="492" x2="24" y2="492" stroke-width="0.7"/>
    <line x1="15" y1="499" x2="20" y2="505" stroke-width="0.7"/>
    <line x1="1"  y1="499" x2="-4" y2="505" stroke-width="0.7"/>
    <line x1="-1" y1="492" x2="-8" y2="492" stroke-width="0.7"/>
    <line x1="1"  y1="485" x2="-4" y2="479" stroke-width="0.7"/>

