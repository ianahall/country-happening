    <path d="M30,475 C12,461 2,440 -2,418"    stroke-width="1.1"/>
    <path d="M30,405 C46,391 56,372 58,352"   stroke-width="1.1"/>
    <path d="M30,355 C14,343 4,326 0,306"     stroke-width="1.1"/>

    <!-- ── PLANT 3: Queen Anne's Lace / compound umbel – right ─── -->
    <line x1="162" y1="600" x2="162" y2="312" stroke-width="1.2"/>
